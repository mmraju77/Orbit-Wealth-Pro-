    <style>
      :root {
        --font-display-swap: swap;
      }
      body { background-color: #0B1221; color: white; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
      #root { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
      
      /* Fast CSS Spinner */
      .initial-spinner {
        width: 48px;
        height: 48px;
        border: 4px solid rgba(212, 175, 55, 0.2);
        border-top-color: #D4AF37;
        border-radius: 50%;

      @keyframes initial-spin {

          transform: rotate(360deg);
        }
      }
    </style>
